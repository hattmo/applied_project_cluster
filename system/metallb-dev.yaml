apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: dev-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.30.0.100-172.30.0.110
  autoAssign: true
  namespaceSelectors:
  - matchLabels:
      kubernetes.io/metadata.name: dev-npc
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: dev-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - dev-pool
