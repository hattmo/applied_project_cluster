apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: npc
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hattmo/applied_project_cluster.git
    targetRevision: HEAD
    path: charts/npc
    helm:
      valueFiles:
        - values.yaml
      # Override versions from versions.yml - ArgoCD will use these values
      # To update versions, edit versions.yml and run scripts/sync-versions-to-helm.sh
      parameters:
        - name: images.controller.tag
          value: "0.1.0"
        - name: images.openclaw.tag
          value: "0.1.0"
        - name: images.vmwareGateway.tag
          value: "0.1.0"
  destination:
    server: https://kubernetes.default.svc
    namespace: npc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
