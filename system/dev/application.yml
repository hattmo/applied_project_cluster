apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: npc-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hattmo/applied_project_cluster.git
    targetRevision: dev
    path: chart
  destination:
    server: https://kubernetes.default.svc
    namespace: npc-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
