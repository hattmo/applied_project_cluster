# External LoadBalancer for Controller
# Apply this separately to expose controller externally
# This is kept outside the Helm chart for environment-specific configuration

apiVersion: v1
kind: Service
metadata:
  name: controller-lb
  namespace: npc-dev
spec:
  type: LoadBalancer
  selector:
    app: controller
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: matrix-lb
  namespace: npc-dev
spec:
  type: LoadBalancer
  selector:
    app: matrix
  ports:
  - port: 443
    targetPort: 8443
    protocol: TCP
