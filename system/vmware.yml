apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmware-gateway
  namespace: npc
  labels:
    app: vmware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmware
  template:
    metadata:
      labels:
        app: vmware
    spec:
      containers:
      - name: app
        image: hattmo/vmware-gateway:0.1.0
        envFrom:
        - secretRef:
            name: vmware-creds
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmware-gateway
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: vmware
  ports:
  - port: 80
    targetPort: 8080
