apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: npc-prod-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.30.0.60-172.30.0.69
  autoAssign: true
  namespaceSelectors:
  - matchLabels:
      kubernetes.io/metadata.name: npc-prod
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: npc-prod-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - npc-prod-pool
