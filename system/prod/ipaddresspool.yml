apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: prod-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.30.0.50-172.30.0.60
  autoAssign: true
  namespaceSelectors:
  - matchLabels:
      kubernetes.io/metadata.name: prod-npc
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: prod-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - prod-pool
