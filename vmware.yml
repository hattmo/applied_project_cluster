apiVersion: v1
kind: Pod
metadata:
  name: vmware-gateway
  labels:
    app: vmware
spec:
  containers:
  - name: app
    image: hattmo/vmware_gateway
    envFrom:
    - secretRef:
        name: vmware-creds
---
apiVersion: v1
kind: Service
metadata:
  name: vmware-gateway-service
spec:
  type: ClusterIP
  selector:
    app: vmware
  ports:
  - port: 80
    targetPort: 8888

