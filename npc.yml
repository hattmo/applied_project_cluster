apiVersion: v1
kind: Namespace
metadata:
  name: npc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmware-gateway
  namespace: npc
  labels:
    app: vmware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmware
  template:
    metadata:
      labels:
        app: vmware
    spec:
      containers:
      - name: app
        image: hattmo/vmware_gateway
        envFrom:
        - secretRef:
            name: vmware-creds
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmware-gateway-service
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: vmware
  ports:
  - port: 80
    targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: npc
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-creds
              key: api-key
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        ports:
        - containerPort: 11434
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      - name: openclaw
        image: hattmo/openclaw:latest
        env:
        - name: OLLAMA_HOST
          value: "http://localhost:11434"
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        - name: OPENCLAW_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-creds
              key: api-key
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
          readOnly: true
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: npc
spec:
  storageClassName: openebs-single-replica
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: agent
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: npc
data:
  model: "qwen3.5"

