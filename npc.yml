apiVersion: v1
kind: Namespace
metadata:
  name: npc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmware-gateway
  namespace: npc
  labels:
    app: vmware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmware
  template:
    metadata:
      labels:
        app: vmware
    spec:
      containers:
      - name: app
        image: hattmo/vmware_gateway
        envFrom:
        - secretRef:
            name: vmware-creds
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmware-gateway-service
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: vmware
  ports:
  - port: 80
    targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: npc
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-creds
              key: api-key
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        ports:
        - containerPort: 11434
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        env:
        - name: HOME
          value: /home/node
        - name: OLLAMA_HOST
          value: "http://localhost:11434"
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        - name: TZ
          value: UTC
        - name: OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK
          value: "true"
        ports:
        - containerPort: 18789
        command:
        - node
        - dist/index.js
        - gateway
        - --bind
        - lan
        - --port
        - "18789"
        - --allow-unconfigured
        livenessProbe:
          httpGet:
            path: /healthz
            port: 18789
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 18789
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
          readOnly: true
        - name: openclaw-config
          mountPath: /home/node/.openclaw
        - name: openclaw-workspace
          mountPath: /home/node/.openclaw/workspace
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-pvc
      - name: openclaw-config
        persistentVolumeClaim:
          claimName: openclaw-config-pvc
      - name: openclaw-workspace
        persistentVolumeClaim:
          claimName: openclaw-workspace-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: npc
spec:
  storageClassName: openebs-hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-config-pvc
  namespace: npc
spec:
  storageClassName: openebs-hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-workspace-pvc
  namespace: npc
spec:
  storageClassName: openebs-hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: agent
  ports:
  - port: 18789
    targetPort: 18789
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: npc
data:
  model: "qwen3.5"

