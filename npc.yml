apiVersion: v1
kind: Namespace
metadata:
  name: npc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmware-gateway
  namespace: npc
  labels:
    app: vmware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmware
  template:
    metadata:
      labels:
        app: vmware
    spec:
      containers:
      - name: app
        image: hattmo/vmware_gateway
        envFrom:
        - secretRef:
            name: vmware-creds
        livenessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmware-gateway-service
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: vmware
  ports:
  - port: 80
    targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: npc
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-creds
              key: api-key
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        ports:
        - containerPort: 11434
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: npc
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: npc
data:
  model: "qwen3.5"

