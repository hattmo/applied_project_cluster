# Flux Image Automation - Track Docker Hub images and auto-update deployments
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: vmware-gateway
  namespace: flux-system
spec:
  image: hattmo/vmware-gateway
  interval: 5m
  provider: generic
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: vmware-gateway
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: vmware-gateway
  filterTags:
    pattern: '^latest$'
  policy:
    semver:
      range: '*'
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: openclaw
  namespace: flux-system
spec:
  image: hattmo/openclaw
  interval: 5m
  provider: generic
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: openclaw
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: openclaw
  filterTags:
    pattern: '^latest$'
  policy:
    semver:
      range: '*'
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: applied-project
  namespace: flux-system
spec:
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@hattmo.com
        name: Flux
      messageTemplate: '{{range .Updated.Images}}{{println .}}{{end}}'
    push:
      branch: main
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  update:
    strategy: Setters
---
