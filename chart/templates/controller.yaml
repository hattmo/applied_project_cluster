apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  labels:
    app: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      containers:
      - name: controller
        image: hattmo/controller:{{ .Values.images.controller.tag }}
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: MATRIX_HOSTNAME
          value: "matrix.{{ .Release.Namespace }}.svc.cluster.local"
        - name: VMWARE_GATEWAY_HOSTNAME
          value: "vmware-gateway"
        - name: MATRIX_SECRET
          valueFrom:
            secretKeyRef:
              name: matrix-shared-secret
              key: shared_secret
        - name: MATRIX_PASSWORD
          valueFrom:
            secretKeyRef:
              name: creds
              key: matrix-password
        - name: MATRIX_CA_CERT
          value: "/etc/ssl/certs/matrix-ca/ca.crt"
        volumeMounts:
        - name: matrix-ca
          mountPath: /etc/ssl/certs/matrix-ca
          readOnly: true
      volumes:
      - name: matrix-ca
        secret:
          secretName: matrix-ca
          defaultMode: 0644
---
apiVersion: v1
kind: Service
metadata:
  name: controller
spec:
  type: ClusterIP
  selector:
    app: controller
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
