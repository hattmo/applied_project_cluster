apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: npc
  labels:
    app: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      containers:
      - name: controller
        image: hattmo/controller:{{ .Values.images.controller.tag }}
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: MATRIX_URL
          value: "http://matrix.npc.svc.cluster.local"
        - name: VMWARE_GATEWAY_URL
          value: "http://vmware-gateway.npc.svc.cluster.local"
        - name: MATRIX_SECRET
          valueFrom:
            secretKeyRef:
              name: matrix-shared-secret
              key: shared_secret
        - name: MATRIX_DATA_PATH
          value: "/app/matrix-data"
        volumeMounts:
        - name: matrix-data
          mountPath: /app/matrix-data
      volumes:
      - name: matrix-data
        persistentVolumeClaim:
          claimName: controller-matrix-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: controller-matrix-pvc
  namespace: npc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: npc
spec:
  type: LoadBalancer
  selector:
    app: controller
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
