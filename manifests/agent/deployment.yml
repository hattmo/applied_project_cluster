apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: npc
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: ollama-creds
              key: api-key
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        ports:
        - containerPort: 11434
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      - name: openclaw
        # flux: get image policy openclaw
        image: hattmo/openclaw:latest
        env:
        - name: HOME
          value: /home/node
        - name: OLLAMA_HOST
          value: "http://localhost:11434"
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ollama-config
              key: model
        - name: TZ
          value: UTC
        - name: MATRIX_HOMESERVER_URL
          valueFrom:
            secretKeyRef:
              name: matrix-creds
              key: homeserver-url
        - name: MATRIX_USER_ID
          valueFrom:
            secretKeyRef:
              name: matrix-creds
              key: user-id
        - name: MATRIX_PASSWORD
          valueFrom:
            secretKeyRef:
              name: matrix-creds
              key: password
        ports:
        - containerPort: 18789
        livenessProbe:
          httpGet:
            path: /healthz
            port: 18789
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 18789
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
          readOnly: true
        - name: openclaw-config
          mountPath: /home/node/.openclaw
        - name: openclaw-workspace
          mountPath: /home/node/.openclaw/workspace
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-pvc
      - name: openclaw-config
        persistentVolumeClaim:
          claimName: openclaw-config-pvc
      - name: openclaw-workspace
        persistentVolumeClaim:
          claimName: openclaw-workspace-pvc
